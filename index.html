<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Generator — Floorstudio × SPM</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1a1a; --ink-2: #555; --ink-3: #999;
  --line: #e2e2e2; --line-strong: #ccc;
  --surface: #fafaf8; --surface-2: #fff; --surface-3: #f3f2ef;
  --accent: #8B4513; --accent-light: #f5ede7; --accent-mid: #c4793a;
  --success: #2d6a4f; --success-bg: #e8f5ee;
  --danger: #c0392b; --danger-bg: #fdf0ef;
  --warn-bg: #fef9e7; --warn: #b7770d;
  --radius: 8px; --radius-lg: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
body { font-family: 'Georgia', serif; background: var(--surface); color: var(--ink); font-size: 15px; line-height: 1.6; }

/* LAYOUT */
.app { display: grid; grid-template-columns: 430px 1fr; min-height: 100vh; }

/* SIDEBAR */
.sidebar { background: var(--surface-2); border-right: 1px solid var(--line); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--line); }
.sidebar-header h1 { font-size: 16px; font-weight: bold; color: var(--accent); letter-spacing: 0.5px; }
.sidebar-header p { font-size: 11px; color: var(--ink-3); font-family: sans-serif; margin-top: 2px; }

.form-body { padding: 18px 22px; flex: 1; }
.section { margin-bottom: 20px; }
.section-title { font-size: 11px; font-family: sans-serif; font-weight: bold; color: var(--ink-3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 12px; font-family: sans-serif; color: var(--ink-2); margin-bottom: 4px; font-weight: 500; }
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--line-strong); border-radius: var(--radius);
  padding: 8px 10px; font-size: 13px; font-family: sans-serif;
  background: var(--surface-2); color: var(--ink); transition: border 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent-mid); }
.field textarea { resize: vertical; min-height: 60px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* APPROVAL PANEL */
.approval-panel { margin-bottom: 16px; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--line); }
.approval-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; font-size: 12px; font-family: sans-serif; font-weight: bold; }
.approval-header.draft { background: var(--warn-bg); color: var(--warn); border-bottom: 1px solid #fce8a0; }
.approval-header.approved { background: var(--success-bg); color: var(--success); border-bottom: 1px solid #a3d9b8; }
.approval-header.revisi { background: var(--danger-bg); color: var(--danger); border-bottom: 1px solid #f5bcb8; }
.approval-body { padding: 10px 14px; font-size: 12px; font-family: sans-serif; color: var(--ink-2); }
.approval-body .quo-num { font-weight: bold; color: var(--ink); font-size: 13px; margin-bottom: 6px; }
.check-status-btn { margin-top: 8px; padding: 6px 14px; border: 1px solid var(--accent-mid); border-radius: 6px; background: var(--accent-light); color: var(--accent); font-size: 12px; cursor: pointer; font-family: sans-serif; }
.check-status-btn:hover { background: var(--accent-mid); color: #fff; }

/* ROOMS */
.rooms-container { display: flex; flex-direction: column; gap: 10px; }
.room-card { border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); }
.room-card-header { background: var(--accent-light); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
.room-card-header span { font-size: 12px; font-family: sans-serif; font-weight: bold; color: var(--accent); }
.room-remove-btn { background: none; border: none; cursor: pointer; color: var(--danger); font-size: 18px; line-height: 1; padding: 0 4px; }
.room-card-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

/* IMAGE UPLOAD */
.img-upload-area { border: 2px dashed var(--line-strong); border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; transition: border 0.2s; background: var(--surface); position: relative; }
.img-upload-area:hover { border-color: var(--accent-mid); background: var(--accent-light); }
.img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.img-upload-area p { font-size: 11px; font-family: sans-serif; color: var(--ink-3); margin-top: 4px; }
.img-preview { width: 100%; max-height: 120px; object-fit: contain; border-radius: 6px; display: none; }
.img-upload-icon { font-size: 22px; }

/* PRICE TAG */
.price-tag { background: var(--accent-light); border: 1px solid #e8c9a8; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: sans-serif; color: var(--accent); font-weight: bold; text-align: right; }

/* BUTTONS */
.add-room-btn { width: 100%; padding: 10px; border: 2px dashed var(--accent-mid); border-radius: var(--radius); background: none; color: var(--accent-mid); font-size: 13px; font-family: sans-serif; cursor: pointer; transition: all 0.15s; }
.add-room-btn:hover { background: var(--accent-light); }

.apps-script-url { width: 100%; font-size: 11px; padding: 6px 8px; border: 1px solid var(--line-strong); border-radius: 6px; font-family: monospace; background: #f8f8f8; color: var(--ink-2); margin-top: 4px; }

.submit-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-family: sans-serif; font-weight: bold; cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s; }
.submit-btn:hover { background: #6b3410; }
.submit-btn:disabled { background: #ccc; cursor: not-allowed; }

.print-btn { width: 100%; padding: 11px; background: var(--success-bg); color: var(--success); border: 1px solid #a3d9b8; border-radius: var(--radius); font-size: 14px; font-family: sans-serif; font-weight: bold; cursor: pointer; margin-top: 8px; transition: all 0.15s; }
.print-btn:hover { background: var(--success); color: white; }
.print-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.sidebar-footer { padding: 16px 22px; border-top: 1px solid var(--line); }
.status-msg { font-size: 12px; font-family: sans-serif; padding: 8px 12px; border-radius: 6px; margin-bottom: 10px; display: none; }
.status-msg.show { display: block; }
.status-msg.ok { background: var(--success-bg); color: var(--success); }
.status-msg.err { background: var(--danger-bg); color: var(--danger); }
.status-msg.loading { background: var(--warn-bg); color: var(--warn); }

/* HISTORY PANEL */
.history-toggle { width: 100%; text-align: left; padding: 8px 0; background: none; border: none; font-size: 12px; font-family: sans-serif; color: var(--ink-3); cursor: pointer; display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.history-toggle:hover { color: var(--accent); }
.history-panel { display: none; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-top: 8px; }
.history-panel.open { display: block; }
.history-item { padding: 8px 12px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.1s; }
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: var(--accent-light); }
.history-item .hi-num { font-size: 12px; font-weight: bold; font-family: sans-serif; color: var(--accent); }
.history-item .hi-client { font-size: 12px; font-family: sans-serif; color: var(--ink); }
.history-item .hi-date { font-size: 10px; font-family: sans-serif; color: var(--ink-3); }

/* PREVIEW */
.preview-pane { background: #e8e5e0; padding: 32px 24px; overflow-y: auto; }
.preview-pane h2 { font-size: 12px; font-family: sans-serif; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.quo-paper { background: white; max-width: 780px; margin: 0 auto; box-shadow: var(--shadow); padding: 40px 48px; position: relative; }

/* WATERMARK */
.quo-paper.is-draft::before {
  content: 'DRAFT';
  position: fixed; top: 50%; left: 60%; transform: translate(-50%, -50%) rotate(-35deg);
  font-size: 90px; font-weight: bold; font-family: sans-serif;
  color: rgba(180, 0, 0, 0.07); letter-spacing: 10px;
  pointer-events: none; z-index: 5; white-space: nowrap;
}

/* QUOTATION STYLES */
.quo-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; border-bottom: 2px solid var(--ink); padding-bottom: 18px; }
.quo-company h2 { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
.quo-company p { font-size: 11px; color: var(--ink-2); line-height: 1.5; margin-top: 4px; }
.quo-meta table { font-size: 12px; border-collapse: collapse; }
.quo-meta td { padding: 2px 6px; }
.quo-meta td:first-child { color: var(--ink-2); white-space: nowrap; }
.quo-meta td:last-child { font-weight: bold; }
.quo-title { font-size: 20px; font-weight: bold; text-align: center; letter-spacing: 2px; margin-bottom: 20px; }
.quo-to { font-size: 12px; margin-bottom: 20px; }
.quo-to strong { display: block; margin-bottom: 4px; font-size: 13px; }
.quo-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
.quo-table th { background: var(--ink); color: white; padding: 8px 10px; text-align: left; font-family: sans-serif; font-size: 11px; letter-spacing: 0.5px; }
.quo-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
.quo-table tr:nth-child(even) td { background: #fafaf8; }
.quo-table .room-img { width: 90px; height: 70px; object-fit: cover; border-radius: 4px; }
.quo-table .no-img { width: 90px; height: 70px; background: var(--surface-3); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--ink-3); font-family: sans-serif; }
.quo-totals { margin-left: auto; width: 280px; font-size: 13px; }
.quo-totals table { width: 100%; border-collapse: collapse; }
.quo-totals td { padding: 5px 8px; }
.quo-totals tr:last-child td { font-weight: bold; border-top: 2px solid var(--ink); padding-top: 8px; font-size: 15px; }
.quo-totals td:last-child { text-align: right; }
.quo-notes { font-size: 11px; color: var(--ink-2); margin-top: 20px; border-top: 1px solid var(--line); padding-top: 14px; }
.quo-notes ul { margin-left: 16px; margin-top: 4px; }
.quo-notes ul li { margin-bottom: 3px; }
.quo-bank { margin-top: 16px; padding: 12px 16px; background: var(--surface-3); border-radius: 6px; font-size: 11px; }
.quo-bank strong { font-size: 12px; display: block; margin-bottom: 6px; }
.quo-bank dl { display: grid; grid-template-columns: 100px 1fr; gap: 3px 8px; }
.quo-bank dt { color: var(--ink-2); }
.quo-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; font-size: 12px; }
.quo-sign-label { margin-bottom: 60px; }
.quo-sign-name { border-top: 1px solid var(--ink); padding-top: 6px; font-weight: bold; }
.quo-company-footer { text-align: center; font-size: 10px; color: var(--ink-3); margin-top: 24px; border-top: 1px solid var(--line); padding-top: 12px; line-height: 1.6; }

@media print {
  .sidebar { display: none; }
  .app { grid-template-columns: 1fr; }
  .preview-pane { background: white; padding: 0; }
  .preview-pane h2 { display: none; }
  .quo-paper { box-shadow: none; max-width: 100%; }
  .quo-paper.is-draft::before { position: absolute; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ========== SIDEBAR ========== -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>FLOORSTUDIO × SPM</h1>
      <p>Quotation Generator — PT. Sarana Prasanti Mandiri</p>
    </div>

    <div class="form-body">

      <!-- APPROVAL STATUS -->
      <div id="approvalPanel" style="display:none;"></div>

      <!-- APPS SCRIPT URL CONFIG -->
      <div class="section">
        <div class="section-title">⚙️ Konfigurasi</div>
        <div class="field">
          <label>Apps Script URL</label>
          <input type="url" id="appsScriptUrl" class="apps-script-url"
            placeholder="https://script.google.com/macros/s/.../exec"
            value="https://script.google.com/macros/s/AKfycbwR_w5suu5yefHp4SKWvK7arLsRVStVTr6ojC5Y9uPuSlElkS2p67cRmxOOq_tTceak/exec">
        </div>
      </div>

      <!-- INFO UTAMA -->
      <div class="section">
        <div class="section-title">📋 Info Penawaran</div>
        <div class="field">
          <label>Nama Sales</label>
          <input type="text" id="salesName" placeholder="Nama sales" oninput="updatePreview()">
        </div>
        <div class="field">
          <label>Nomor Quotation</label>
          <input type="text" id="quoNumber" placeholder="Auto-generate saat submit" readonly
            style="background:#f5f5f5; color:var(--ink-2); font-family:monospace; font-size:12px;">
        </div>
        <div class="field">
          <label>Tanggal</label>
          <input type="date" id="quoDate" oninput="updatePreview()">
        </div>
        <div class="field">
          <label>Berlaku Hingga</label>
          <input type="date" id="quoValid" oninput="updatePreview()">
        </div>
      </div>

      <!-- CLIENT -->
      <div class="section">
        <div class="section-title">🏢 Data Client</div>
        <div class="field">
          <label>Nama Client / Perusahaan</label>
          <input type="text" id="clientName" placeholder="Nama client" oninput="updatePreview()">
        </div>
        <div class="field">
          <label>Nama Project</label>
          <input type="text" id="projectName" placeholder="Nama project / gedung" oninput="updatePreview()">
        </div>
        <div class="field">
          <label>Alamat Project</label>
          <textarea id="projectAddress" rows="2" placeholder="Alamat lengkap project" oninput="updatePreview()"></textarea>
        </div>
        <div class="field">
          <label>Diskon (%)</label>
          <input type="number" id="discountPct" value="0" min="0" max="100" step="0.5" oninput="updatePreview()">
        </div>
      </div>

      <!-- ROOMS -->
      <div class="section">
        <div class="section-title">🏠 Area / Room</div>
        <div class="rooms-container" id="roomsContainer"></div>
        <button class="add-room-btn" onclick="addRoom()">+ Tambah Area / Room</button>
      </div>

      <!-- ON-SITE CHARGE -->
      <div class="section">
        <div class="section-title">🔧 Biaya Tambahan</div>
        <div class="field">
          <label>On-site Charge (Rp) — isi 0 jika tidak ada</label>
          <input type="number" id="onSiteCharge" value="0" min="0" step="1000" oninput="updatePreview()">
        </div>
      </div>

      <!-- CATATAN -->
      <div class="section">
        <div class="section-title">📝 Catatan</div>
        <div class="field">
          <label>Catatan Tambahan (opsional)</label>
          <textarea id="extraNotes" rows="2" placeholder="Catatan khusus untuk quotation ini" oninput="updatePreview()"></textarea>
        </div>
      </div>

    </div><!-- /form-body -->

    <div class="sidebar-footer">
      <div class="status-msg" id="statusMsg"></div>
      <button class="submit-btn" id="submitBtn" onclick="submitQuotation()">📤 Submit untuk Approval</button>
      <button class="print-btn" id="printBtn" onclick="window.print()" disabled>🖨️ Cetak PDF</button>
      <button class="history-toggle" onclick="toggleHistory()">📂 <span id="historyToggleLabel">Lihat Riwayat Quotation</span></button>
      <div class="history-panel" id="historyPanel"></div>
    </div>
  </div>

  <!-- ========== PREVIEW ========== -->
  <div class="preview-pane">
    <h2>PREVIEW QUOTATION</h2>
    <div class="quo-paper is-draft" id="quoPaper">
      <div id="quoContent">
        <p style="text-align:center;color:#bbb;font-family:sans-serif;padding:60px 0;font-size:13px;">
          Isi form di sebelah kiri untuk melihat preview quotation
        </p>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
// ============================================================
// PRICE LIST — dari master_template.xlsx (35 item)
// ============================================================
const PRICE_LIST = [
  // Signature Collection
  { item:'Signature | 100% Acrylic | HA 450', category:'Signature', spec:'100% Acrylic', code:'HA 450', weight:'72oz', price:2850000 },
  { item:'Signature | 100% Acrylic | HA 550', category:'Signature', spec:'100% Acrylic', code:'HA 550', weight:'88oz', price:2950000 },
  { item:'Signature | 100% Acrylic | HA 650', category:'Signature', spec:'100% Acrylic', code:'HA 650', weight:'104oz', price:3350000 },
  { item:'Signature | 100% Wool | HW 450', category:'Signature', spec:'100% Wool', code:'HW 450', weight:'72oz', price:3500000 },
  { item:'Signature | 100% Wool | HW 550', category:'Signature', spec:'100% Wool', code:'HW 550', weight:'88oz', price:3750000 },
  { item:'Signature | 100% Wool | HW 650', category:'Signature', spec:'100% Wool', code:'HW 650', weight:'104oz', price:4200000 },
  { item:'Signature | Bamboo Silk | HBS 450', category:'Signature', spec:'Bamboo Silk', code:'HBS 450', weight:'72oz', price:5350000 },
  { item:'Signature | Bamboo Silk | HBS 550', category:'Signature', spec:'Bamboo Silk', code:'HBS 550', weight:'88oz', price:5650000 },
  { item:'Signature | Viscose | HV 450', category:'Signature', spec:'Viscose', code:'HV 450', weight:'72oz', price:3800000 },
  { item:'Signature | Viscose | HV 550', category:'Signature', spec:'Viscose', code:'HV 550', weight:'88oz', price:4100000 },
  { item:'Signature | Acrylic+Bamboo Silk | HAB 450', category:'Signature', spec:'Acrylic+Bamboo Silk', code:'HAB 450', weight:'72oz', price:3900000 },
  { item:'Signature | Acrylic+Viscose | HAV 450', category:'Signature', spec:'Acrylic+Viscose', code:'HAV 450', weight:'72oz', price:3500000 },
  { item:'Signature | Wool+Bamboo Silk | HWB 450', category:'Signature', spec:'Wool+Bamboo Silk', code:'HWB 450', weight:'72oz', price:4500000 },
  { item:'Signature | Wool+Viscose | HWV 450', category:'Signature', spec:'Wool+Viscose', code:'HWV 450', weight:'72oz', price:4200000 },
  // Project Collection
  { item:'Project | Acrylic | HA 350', category:'Project', spec:'100% Acrylic', code:'HA 350', weight:'56oz', price:2105000 },
  { item:'Project | Acrylic | HA 450', category:'Project', spec:'100% Acrylic', code:'HA 450', weight:'72oz', price:2300000 },
  { item:'Project | Acrylic | HA 550', category:'Project', spec:'100% Acrylic', code:'HA 550', weight:'88oz', price:2500000 },
  { item:'Project | Wool | HW 450', category:'Project', spec:'100% Wool', code:'HW 450', weight:'72oz', price:2900000 },
  { item:'Project | Wool | HW 550', category:'Project', spec:'100% Wool', code:'HW 550', weight:'88oz', price:3150000 },
  { item:'Project | Bamboo Silk | HBS 450', category:'Project', spec:'Bamboo Silk', code:'HBS 450', weight:'72oz', price:4200000 },
  { item:'Project | Viscose | HV 450', category:'Project', spec:'Viscose', code:'HV 450', weight:'72oz', price:3100000 },
  { item:'Project | Acrylic+Bamboo Silk | HAB 450', category:'Project', spec:'Acrylic+Bamboo Silk', code:'HAB 450', weight:'72oz', price:3200000 },
  { item:'Project | Acrylic+Viscose | HAV 450', category:'Project', spec:'Acrylic+Viscose', code:'HAV 450', weight:'72oz', price:2800000 },
  { item:'Project | Wool+Bamboo Silk | HWB 450', category:'Project', spec:'Wool+Bamboo Silk', code:'HWB 450', weight:'72oz', price:3700000 },
  { item:'Project | Wool+Viscose | HWV 450', category:'Project', spec:'Wool+Viscose', code:'HWV 450', weight:'72oz', price:3400000 },
  { item:'Project | Jute | HJ 350', category:'Project', spec:'Jute', code:'HJ 350', weight:'56oz', price:1850000 },
  { item:'Project | Jute | HJ 450', category:'Project', spec:'Jute', code:'HJ 450', weight:'72oz', price:2050000 },
  // Firmfit
  { item:'Firmfit | Herringbone Pattern', category:'Firmfit', spec:'Herringbone', code:'FF-HB', weight:'-', price:1650000 },
  { item:'Firmfit | Nylon Print', category:'Firmfit', spec:'Nylon Print', code:'FF-NP', weight:'-', price:1450000 },
  // Additional
  { item:'Signature | 100% Acrylic | HA 750', category:'Signature', spec:'100% Acrylic', code:'HA 750', weight:'120oz', price:3850000 },
  { item:'Signature | 100% Wool | HW 750', category:'Signature', spec:'100% Wool', code:'HW 750', weight:'120oz', price:4700000 },
  { item:'Project | Acrylic | HA 650', category:'Project', spec:'100% Acrylic', code:'HA 650', weight:'104oz', price:2750000 },
  { item:'Project | Wool | HW 650', category:'Project', spec:'100% Wool', code:'HW 650', weight:'104oz', price:3500000 },
  { item:'Signature | Bamboo Silk | HBS 650', category:'Signature', spec:'Bamboo Silk', code:'HBS 650', weight:'104oz', price:6200000 },
  { item:'Project | Bamboo Silk | HBS 550', category:'Project', spec:'Bamboo Silk', code:'HBS 550', weight:'88oz', price:4700000 },
];

// ============================================================
// STATE
// ============================================================
let roomCount = 0;
let currentStatus = 'draft'; // draft | submitted | approved | revisi
let currentQuoNumber = '';

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  // Set tanggal default
  const today = new Date();
  document.getElementById('quoDate').value = today.toISOString().split('T')[0];
  const valid = new Date(today);
  valid.setDate(valid.getDate() + 14);
  document.getElementById('quoValid').value = valid.toISOString().split('T')[0];

  // Tambah 1 room default
  addRoom();

  // Coba tarik price list dari Google Sheets
  fetchLivePriceList();
});

// ============================================================
// LIVE PRICE LIST
// ============================================================
function fetchLivePriceList() {
  const url = document.getElementById('appsScriptUrl').value.trim();
  if (!url || url === '') return;

  fetch(url + '?action=getPriceList')
    .then(r => r.json())
    .then(data => {
      if (data && data.priceList && data.priceList.length > 0) {
        // Update global PRICE_LIST dengan data live
        data.priceList.forEach(live => {
          const idx = PRICE_LIST.findIndex(p => p.code === live.code || p.item === live.item);
          if (idx >= 0) PRICE_LIST[idx].price = live.price;
        });
        // Refresh semua dropdown yang ada
        document.querySelectorAll('.room-material-select').forEach(sel => {
          const val = sel.value;
          populateMaterialSelect(sel);
          sel.value = val;
        });
        updatePreview();
        console.log('Price list live berhasil dimuat dari Google Sheets');
      }
    })
    .catch(() => console.log('Pakai price list lokal (Apps Script tidak tersedia)'));
}

// ============================================================
// ROOMS
// ============================================================
function populateMaterialSelect(sel) {
  const currentVal = sel.value;
  sel.innerHTML = '<option value="">-- Pilih Material --</option>';
  let lastCat = '';
  PRICE_LIST.forEach(p => {
    if (p.category !== lastCat) {
      const og = document.createElement('optgroup');
      og.label = '── ' + p.category + ' Collection ──';
      sel.appendChild(og);
      lastCat = p.category;
    }
    const opt = document.createElement('option');
    opt.value = p.item;
    opt.textContent = p.item + ' — Rp ' + p.price.toLocaleString('id-ID') + '/m²';
    if (p.item === currentVal) opt.selected = true;
    sel.appendChild(opt);
  });
}

function handleImageUpload(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = document.getElementById('rimg-preview-' + id);
    preview.src = e.target.result;
    preview.style.display = 'block';
    const area = preview.closest('.img-upload-area');
    area.querySelector('p').style.display = 'none';
    area.querySelector('.img-upload-icon').style.display = 'none';
    updatePreview();
  };
  reader.readAsDataURL(file);
}

function updateRoomPrice(id) {
  const matVal = document.getElementById('rmat-' + id).value;
  const priceTag = document.getElementById('rprice-' + id);
  const w = parseFloat(document.getElementById('rw-' + id).value) || 0;
  const l = parseFloat(document.getElementById('rl-' + id).value) || 0;
  if (!matVal) { priceTag.textContent = 'Pilih material untuk melihat harga'; return; }
  const found = PRICE_LIST.find(p => p.item === matVal);
  if (found) {
    const qty = parseInt(document.getElementById('rqty-' + id)?.value) || 1;
    const area = w * l;
    const subtotal = area * found.price * qty;
    priceTag.innerHTML = `
      Rp ${found.price.toLocaleString('id-ID')}/m²
      ${area > 0 ? ' &nbsp;|&nbsp; ' + area.toFixed(2) + ' m²' + (qty > 1 ? ' × ' + qty + ' pcs' : '') + ' &nbsp;=&nbsp; <strong>Rp ' + Math.round(subtotal).toLocaleString('id-ID') + '</strong>' : ''}
    `;
  }
}

// ============================================================
// COLLECT ROOMS DATA
// ============================================================
function collectRooms() {
  const rooms = [];
  document.querySelectorAll('.room-card').forEach(card => {
    const id = card.id.replace('room-', '');
    const name = (document.getElementById('rname-' + id) || {}).value || '';
    const w = parseFloat((document.getElementById('rw-' + id) || {}).value) || 0;
    const l = parseFloat((document.getElementById('rl-' + id) || {}).value) || 0;
    const matVal = (document.getElementById('rmat-' + id) || {}).value || '';
    const qty = parseInt((document.getElementById('rqty-' + id) || {}).value) || 1;
    const imgPreview = document.getElementById('rimg-preview-' + id);
    const imgSrc = imgPreview && imgPreview.style.display !== 'none' ? imgPreview.src : null;
    const found = PRICE_LIST.find(p => p.item === matVal);
    const pricePerM2 = found ? found.price : 0;
    const area = w * l;
    const subtotal = area * pricePerM2 * qty;
    rooms.push({ id, name, w, l, qty, material: matVal, pricePerM2, area, subtotal, imgSrc });
  });
  return rooms;
}

// ============================================================
// KALKULASI
// ============================================================
function calcTotals(rooms, discountPct) {
  const subTotal = rooms.reduce((s, r) => s + r.subtotal, 0);
  const onSiteCharge = parseFloat(document.getElementById('onSiteCharge')?.value) || 0;
  const afterOnSite = subTotal + onSiteCharge;
  const discountAmt = afterOnSite * (discountPct / 100);
  const afterDiscount = afterOnSite - discountAmt;
  const ppn = afterDiscount * 0.11;
  const grandTotal = afterDiscount + ppn;
  return { subTotal, onSiteCharge, discountAmt, afterOnSite, afterDiscount, ppn, grandTotal };
}

// ============================================================
// FORMAT HELPERS
// ============================================================
function fmtRp(n) { return 'Rp ' + Math.round(n).toLocaleString('id-ID'); }
function fmtDate(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

// ============================================================
// SUBMIT
// ============================================================
function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg show ' + type;
}
function hideStatus() {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg';
}

async function submitQuotation() {
  const url = document.getElementById('appsScriptUrl').value.trim();
  if (!url) { showStatus('Isi Apps Script URL dulu di bagian Konfigurasi', 'err'); return; }

  const rooms = collectRooms();
  const discountPct = parseFloat(document.getElementById('discountPct').value) || 0;
  const totals = calcTotals(rooms, discountPct);

  const payload = {
    salesName: document.getElementById('salesName').value,
    clientName: document.getElementById('clientName').value,
    projectName: document.getElementById('projectName').value,
    projectAddress: document.getElementById('projectAddress').value,
    quoDate: document.getElementById('quoDate').value,
    quoValid: document.getElementById('quoValid').value,
    discountPct,
    rooms: rooms.map(r => ({ name: r.name, w: r.w, l: r.l, qty: r.qty, material: r.material, area: r.area, pricePerM2: r.pricePerM2, subtotal: r.subtotal })),
    totals,
    extraNotes: document.getElementById('extraNotes').value
  };

  if (!payload.salesName || !payload.clientName || !payload.projectName) {
    showStatus('Nama Sales, Client, dan Project harus diisi', 'err'); return;
  }
  if (rooms.length === 0 || rooms.every(r => !r.material)) {
    showStatus('Minimal satu room dengan material harus diisi', 'err'); return;
  }

  document.getElementById('submitBtn').disabled = true;
  showStatus('⏳ Mengirim ke Apps Script...', 'loading');

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    if (data.success) {
      currentQuoNumber = data.quoNumber;
      document.getElementById('quoNumber').value = data.quoNumber;
      currentStatus = 'submitted';
      showApprovalPanel('waiting', data.quoNumber);
      showStatus('✅ Berhasil! Notifikasi dikirim ke Telegram manager', 'ok');
      loadHistory();
      updatePreview();
      startPolling();
    } else {
      showStatus('❌ Gagal: ' + (data.error || 'Unknown error'), 'err');
      document.getElementById('submitBtn').disabled = false;
    }
  } catch (e) {
    showStatus('❌ Koneksi gagal. Cek Apps Script URL dan pastikan sudah di-deploy.', 'err');
    document.getElementById('submitBtn').disabled = false;
  }
}

// ============================================================
// APPROVAL PANEL
// ============================================================
function showApprovalPanel(status, quoNumber) {
  const panel = document.getElementById('approvalPanel');
  panel.style.display = 'block';

  const configs = {
    waiting: { cls:'draft', icon:'⏳', label:'Menunggu Approval Manager' },
    approved: { cls:'approved', icon:'✅', label:'Disetujui Manager' },
    revisi: { cls:'revisi', icon:'🔄', label:'Perlu Revisi' },
    draft: { cls:'draft', icon:'📝', label:'Draft — Belum Disubmit' },
  };
  const c = configs[status] || configs.draft;

  // Update watermark
  const paper = document.getElementById('quoPaper');
  if (status === 'approved') {
    paper.classList.remove('is-draft');
    document.getElementById('printBtn').disabled = false;
  } else {
    paper.classList.add('is-draft');
    document.getElementById('printBtn').disabled = true;
  }

  panel.innerHTML = `
    <div class="approval-panel">
      <div class="approval-header ${c.cls}">${c.icon} ${c.label}</div>
      <div class="approval-body">
        <div class="quo-num">${quoNumber || '—'}</div>
        ${status === 'waiting' ? '<div>Tombol Approve/Revisi dikirim ke Telegram manager. Tunggu konfirmasi.</div><button class="check-status-btn" onclick="checkApprovalStatus()">🔄 Cek Status Sekarang</button>' : ''}
        ${status === 'approved' ? '<div>Quotation sudah disetujui. Watermark DRAFT hilang. Silakan cetak PDF.</div>' : ''}
        ${status === 'revisi' ? '<div>Manager meminta revisi. Silakan perbaiki dan submit ulang.</div>' : ''}
      </div>
    </div>
  `;
}

async function checkApprovalStatus() {
  const url = document.getElementById('appsScriptUrl').value.trim();
  if (!url || !currentQuoNumber) return;

  showStatus('⏳ Mengecek status...', 'loading');
  try {
    const resp = await fetch(url + '?action=checkStatus&quoNumber=' + encodeURIComponent(currentQuoNumber));
    const data = await resp.json();
    const status = (data.status || '').toLowerCase();
    hideStatus();
    if (status === 'approved') {
      currentStatus = 'approved';
      showApprovalPanel('approved', currentQuoNumber);
      showStatus('✅ Quotation sudah diapprove!', 'ok');
    } else if (status === 'revisi') {
      currentStatus = 'revisi';
      showApprovalPanel('revisi', currentQuoNumber);
      showStatus('🔄 Manager meminta revisi', 'err');
      document.getElementById('submitBtn').disabled = false;
    } else {
      showStatus('⏳ Masih menunggu approval manager', 'loading');
    }
  } catch (e) {
    hideStatus();
    showStatus('❌ Gagal cek status', 'err');
  }
}

// ============================================================
// AUTO-POLLING
// ============================================================
let pollTimer = null;

function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    const url = document.getElementById('appsScriptUrl').value.trim();
    if (!url || !currentQuoNumber) return;
    try {
      const resp = await fetch(url + '?action=checkStatus&quoNumber=' + encodeURIComponent(currentQuoNumber));
      const data = await resp.json();
      const status = (data.status || '').toLowerCase();
      if (status === 'approved') {
        stopPolling();
        currentStatus = 'approved';
        showApprovalPanel('approved', currentQuoNumber);
        showStatus('✅ Quotation sudah diapprove! PDF dikirim ke Telegram.', 'ok');
        updatePreview();
      } else if (status === 'revisi') {
        stopPolling();
        currentStatus = 'revisi';
        showApprovalPanel('revisi', currentQuoNumber);
        showStatus('🔄 Manager meminta revisi. Silakan perbaiki dan submit ulang.', 'err');
        document.getElementById('submitBtn').disabled = false;
        updatePreview();
      }
    } catch (e) { /* silent - will retry next interval */ }
  }, 20000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

window.addEventListener('beforeunload', stopPolling);

// HISTORY
// ============================================================
let historyOpen = false;
function toggleHistory() {
  historyOpen = !historyOpen;
  const panel = document.getElementById('historyPanel');
  const label = document.getElementById('historyToggleLabel');
  if (historyOpen) {
    panel.classList.add('open');
    label.textContent = 'Sembunyikan Riwayat';
    loadHistory();
  } else {
    panel.classList.remove('open');
    label.textContent = 'Lihat Riwayat Quotation';
  }
}

async function loadHistory() {
  if (!historyOpen) return;
  const url = document.getElementById('appsScriptUrl').value.trim();
  if (!url) return;

  const panel = document.getElementById('historyPanel');
  panel.innerHTML = '<div style="padding:10px;font-size:12px;font-family:sans-serif;color:#888">Memuat riwayat...</div>';

  try {
    const resp = await fetch(url + '?action=getHistory');
    const data = await resp.json();
    if (data.history && data.history.length > 0) {
      panel.innerHTML = data.history.slice(0, 20).map(h => `
        <div class="history-item" onclick="loadHistoryItem('${h.quoNumber}')">
          <div class="hi-num">${h.quoNumber}</div>
          <div class="hi-client">${h.clientName} — ${h.projectName}</div>
          <div class="hi-date">${h.date} | ${h.salesName} | ${h.status || 'submitted'}</div>
        </div>
      `).join('');
    } else {
      panel.innerHTML = '<div style="padding:10px;font-size:12px;font-family:sans-serif;color:#888">Belum ada riwayat</div>';
    }
  } catch (e) {
    panel.innerHTML = '<div style="padding:10px;font-size:12px;font-family:sans-serif;color:#888">Gagal memuat riwayat</div>';
  }
}

function loadHistoryItem(quoNumber) {
  currentQuoNumber = quoNumber;
  document.getElementById('quoNumber').value = quoNumber;
  showStatus('Menampilkan: ' + quoNumber, 'ok');
  updatePreview();
}
